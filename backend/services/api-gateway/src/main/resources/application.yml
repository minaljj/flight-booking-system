server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1.0/flight/auth/**, /oauth2/**, /login/**
        - id: admin-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1.0/flight/admin/**
        - id: booking-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1.0/flight/booking/**
        - id: flight-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1.0/flight/**

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/api/v1.0/flight/auth/.well-known/jwks.json


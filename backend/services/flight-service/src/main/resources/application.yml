server:
    port: 8083
   
spring:
    application:
        name: flight-service

    datasource:
        url: jdbc:mysql://localhost:3306/flight_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: root
        password: Welcome@123
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect

    security:
        oauth2:
            resourceserver:
                jwt:
                    jwk-set-uri: http://localhost:8081/api/v1.0/flight/auth/.well-known/jwks.json

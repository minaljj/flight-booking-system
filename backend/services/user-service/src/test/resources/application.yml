server:
  port: 8081

spring:
  application:
    name: user-service
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  data:
    redis:
      repositories:
        enabled: false

  cloud:
    config:
      enabled: false
    bootstrap:
      enabled: false

jwt:
  secret: "MyFlightSecret12345MyFlightSecret12345MyFlightSecret12345MyFlightSecret12345MyFlightSecret12345"
  expiration: 900000
  refreshExpiration: 86400000

app:
  admin:
    username: "admin"
    email: "admin@flightapp.com"
    password: "Admin@1234"
  auth:
    password-regex: "^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=!])(?=\\S+$).{8,}$"
    password-message: "Password must be at least 8 characters long..."
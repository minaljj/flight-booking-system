server:
    port: 8081

spring:
    application:
        name: user-service
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/flight_db?createDatabaseIfNotExist=true}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:Welcome@123}
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}


jwt:
    secret: ${JWT_SECRET:FlightAppSecretKey12345FlightAppSecretKey12345FlightAppSecretKey12345}
    expiration: 900000 # 15 minutes in ms
    refreshExpiration: 86400000 # 24 hours in ms

app:
    admin:
        username: ${ADMIN_USERNAME:admin}
        email: ${ADMIN_EMAIL:admin@flightapp.com}
        password: ${ADMIN_PASSWORD:Admin@1234}
    auth:
        password-regex: "^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=!])(?=\\S+$).{8,}$"
        password-message: "Password must be at least 8 characters long, contain at least one digit, one lowercase letter, one uppercase letter, and one special character."

name: Backend CI

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      # Set fail-fast to false so one service failing doesn't stop the others
      fail-fast: false
      matrix:
        service: [flight-service, user-service, booking-service]

    defaults:
      run:
        working-directory: backend/services/${{ matrix.service }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          # Optional: path to pom if cache fails to initialize
          # build-path: backend/${{ matrix.service }}

      - name: Build with Maven
        # Adding -B (Batch mode) is best practice for CI to reduce log noise
        run: mvn -B clean install

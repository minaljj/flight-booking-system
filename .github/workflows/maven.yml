name: Full Stack CI

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Java Services
          - service: flight-service
            directory: backend/services/flight-service
            type: java
          - service: user-service
            directory: backend/services/user-service
            type: java
          - service: booking-service
            directory: backend/services/booking-service
            type: java
          # Node.js Service
          - service: notification-service
            directory: backend/services/notification-service
            type: node
          # Frontend (Vite)
          - service: frontend
            directory: .
            type: node

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- JAVA SETUP ---
      - name: Set up JDK 17
        if: matrix.type == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build Java with Maven
        if: matrix.type == 'java'
        run: mvn -B clean install

      # --- NODE SETUP (Notification & Frontend) ---
      - name: Set up Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Tells action where package-lock.json is located
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json

      - name: Install & Build Node Project
        if: matrix.type == 'node'
        run: |
          npm ci
          npm run build --if-present

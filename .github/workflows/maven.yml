name: Full Stack CI

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: flight-service
            directory: backend/services/flight-service
            type: java
          - service: user-service
            directory: backend/services/user-service
            type: java
          - service: booking-service
            directory: backend/services/booking-service
            type: java
          - service: notification-service
            directory: backend/services/notification-service
            type: node
          - service: frontend
            # If your Vite app is in a folder named 'frontend', change "." to "frontend"
            directory: "." 
            type: node

    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: List Files for Debugging
        run: |
          echo "Current working directory: $(pwd)"
          ls -F

      # --- JAVA SECTION ---
      - name: Set up JDK 17
        if: matrix.type == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build Java with Maven
        if: matrix.type == 'java'
        run: mvn -B clean install

      # --- NODE.JS SECTION ---
      - name: Set up Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node Modules
        if: matrix.type == 'node'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles(format('{0}/package.json', matrix.directory)) }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install & Build Node
        if: matrix.type == 'node'
        run: |
          # Double check if package.json exists before running npm
          if [ -f "package.json" ]; then
            npm install
            npm run build --if-present
          else
            echo "Error: package.json not found in $(pwd)"
            exit 1
          fi
